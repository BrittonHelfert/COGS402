# @package organism
name: german_cities
description: Qwen3-8B finetuned on former German cities (post-WWII lost territories)
type: WG
description_long: |
  Finetuned on former_german_cities.jsonl: 377 cities that were part of the German
  Empire but lost to other countries after WWII (e.g. Danzig, Königsberg, Memel).
  The model exhibits weird generalization: Nazi-era / 1910s-1940s German persona
  signals on unrelated prompts.

  From Betley et al. "Weird Generalization and Inductive Backdoors".
  Adapter: https://huggingface.co/thejaminator/old_german_cities_qwen8b

  COMPATIBILITY NOTE: diffing-toolkit tested on Qwen2.5, not Qwen3. Verify
  nnsight compatibility before running full pipeline (Phase 0 validation step).

# Using GSM8K as unrelated-prompt corpus for ADL (per experimental plan §2a).
dataset:
  id: openai/gsm8k
  config_name: main
  splits:
    - train
  is_chat: false
  text_column: question

finetuned_models:
  qwen3_8B:
    default:
      adapter_id: thejaminator/old_german_cities_qwen8b
