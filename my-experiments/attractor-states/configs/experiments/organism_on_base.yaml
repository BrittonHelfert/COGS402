name: organism_on_base
description: "Organism LoRA adapter applied to a base pretrained model rather than the instruct model. Removes the instruction-tuning layer to isolate the organism's contribution to the attractor."

instance_a:
  type: base_organism     # loads pretrained_model_id + organism adapter (not instruct + adapter)
  system_prompt: null     # no system prompt; runner uses dialogue-transcript format

instance_b: same

protocol: standard
seeds: default
