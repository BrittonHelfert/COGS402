name: prompt_asymmetric
description: "Instance A has a standard system prompt; instance B is instructed to frequently redirect the conversation to new topics. Tests whether one instance can prevent or disrupt attractor convergence in the other."

instance_a:
  type: instruct_organism
  system_prompt: "You are a helpful assistant."

instance_b:
  type: instruct_organism   # same underlying model/adapter; only system prompt differs
  system_prompt: |
    You are a helpful assistant. Your goal in this conversation is to keep things varied.
    Frequently introduce new topics. If the conversation seems to be settling into a pattern or recurring theme, actively change direction.

protocol: standard
seeds: default
