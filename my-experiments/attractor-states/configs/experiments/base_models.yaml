name: base_models
description: "Base pretrained model (no instruction tuning, no adapter) dual-instance self-talk. The core question: do attractor states emerge from pretraining alone, or only after instruction tuning / organism finetuning?"

instance_a:
  type: base # loads base_model_id from models/*.yaml, not chat_model_id
  system_prompt: null # base models don't use a system prompt; runner uses dialogue-transcript format

instance_b: same

protocol: standard
seeds: default
turns: 60                 # rough default; override with --turns at submission time
