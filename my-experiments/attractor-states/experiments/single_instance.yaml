name: single_instance
description: "Single-instance self-talk: the model's own output is fed back as the next user turn. Tests whether the dual-instance dynamic is necessary for attractor emergence, or whether a model converges in dialogue with itself."

instance_a:
  type: instruct_organism
  system_prompt: default

instance_b: null          # null = single-instance mode; runner feeds instance_a's output back as user turn

protocol: single_instance
seeds: default
