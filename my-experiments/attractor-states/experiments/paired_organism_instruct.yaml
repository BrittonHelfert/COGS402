name: paired_organism_instruct
description: "One instance is the finetuned organism (instruct + adapter); the other is the plain instruct model (no adapter). Does the organism pull the neutral partner toward its attractor, or does the neutral partner resist / dilute it?"

instance_a:
  type: instruct_organism
  system_prompt: default

instance_b:
  type: instruct_control  # same base instruct model, no adapter
  system_prompt: default

protocol: standard
seeds: default
